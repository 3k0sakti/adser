# ============================================================
# KONFIGURASI 2: Nginx Proxy Cache (Server-Side Cache)
# ============================================================
# Nginx menyimpan salinan respons dari backend di DISK/MEMORY.
# Permintaan berikutnya dipenuhi oleh nginx TANPA meneruskan
# ke backend — backend "tidak tahu" ada request baru.
#
# Cara mengaktifkan:
#   sudo cp /home/momotaro/cache/nginx/2-proxy-cache.conf \
#            /etc/nginx/sites-available/cache-demo
#   sudo ln -sf /etc/nginx/sites-available/cache-demo \
#                /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/cache/nginx/cache_demo
#   sudo chown -R www-data:www-data /var/cache/nginx/cache_demo
#   sudo nginx -t && sudo systemctl reload nginx
#
# Melihat isi cache:
#   ls -lh /var/cache/nginx/cache_demo/
#
# Membersihkan cache:
#   sudo rm -rf /var/cache/nginx/cache_demo/*
#   sudo systemctl reload nginx
# ============================================================

# ── Definisi zona cache (WAJIB di luar blok server) ─────────
# proxy_cache_path  : direktori penyimpanan cache di disk
# levels            : struktur subdirektori (1:2 = 2 tingkat)
# keys_zone         : nama zona + ukuran shared memory untuk key
# max_size          : batas total ukuran cache di disk
# inactive          : hapus entri bila tidak diminta selama X
# use_temp_path     : tulis langsung ke direktori cache
proxy_cache_path /var/cache/nginx/cache_demo
    levels=1:2
    keys_zone=CACHE_DEMO:10m
    max_size=100m
    inactive=60m
    use_temp_path=off;

server {
    listen 8080;
    server_name localhost;

    access_log /var/log/nginx/cache_demo_access.log combined;
    error_log  /var/log/nginx/cache_demo_error.log warn;

    # ── Pengaturan proxy global ─────────────────────────────
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;

    # Gunakan zona cache yang sudah didefinisikan
    proxy_cache            CACHE_DEMO;

    # Kunci cache = kombinasi method + host + URI
    proxy_cache_key        "$scheme$request_method$host$request_uri";

    # Durasi cache berdasarkan status HTTP
    proxy_cache_valid      200 30s;   # respons 200 → cache 30 detik
    proxy_cache_valid       404  1m;   # respons 404 → cache 1 menit

    # Jika backend error/timeout, sajikan konten cache lama (stale)
    proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;

    # Hanya 1 request ke backend saat banyak request simultan (thundering herd protection)
    proxy_cache_lock       on;

    # ── Header debug: status cache ──────────────────────────
    # $upstream_cache_status — nilai: MISS / HIT / STALE / BYPASS / EXPIRED
    add_header X-Cache-Status  $upstream_cache_status always;
    add_header X-Cache-Config  "nginx-proxy-cache" always;

    # ── ① Endpoint yang DIKECUALIKAN dari cache ─────────────
    # no-store → nginx tidak menyimpan meskipun backend tidak melarang
    location /api/nocache {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache off;                     # matikan cache untuk lokasi ini
        add_header  X-Cache-Status "BYPASS-NOCACHE" always;
    }

    location /api/counter {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache off;
    }

    location /api/reset {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache off;
    }

    # ── ② Endpoint cacheable (max-age 30 detik) ─────────────
    location /api/cacheable {
        proxy_pass  http://127.0.0.1:8181;
        # proxy_cache_valid sudah di-set di atas (200 → 30s)
        # Header X-Cache-Status akan tampil: MISS → HIT → EXPIRED → MISS
    }

    # ── ③ Endpoint ETag ──────────────────────────────────────
    location /api/etag {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache_valid 200 60s;
    }

    # ── ④ Endpoint Last-Modified ────────────────────────────
    location /api/lastmod {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache_valid 200 60s;
    }

    # ── ⑤ Endpoint lambat — manfaat cache paling terasa ─────
    location /api/slow {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache_valid 200 20s;   # cache 20 detik
        # Request kedua instan meskipun backend perlu 1.5 detik!
    }

    # ── ⑥ File statis ───────────────────────────────────────
    location /static/ {
        proxy_pass  http://127.0.0.1:8181;
        proxy_cache_valid 200 1h;
        add_header  Cache-Control "public, max-age=3600" always;
    }

    # ── Default ─────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8181;
    }
}
