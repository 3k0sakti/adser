# ============================================================
# KONFIGURASI 1: Browser Cache Headers
# ============================================================
# Nginx berperan sebagai web server / reverse-proxy yang
# menambahkan header HTTP agar BROWSER klien menyimpan cache.
#
# Cara mengaktifkan:
#   sudo cp /home/momotaro/cache/nginx/1-browser-cache.conf \
#            /etc/nginx/sites-available/cache-demo
#   sudo ln -sf /etc/nginx/sites-available/cache-demo \
#                /etc/nginx/sites-enabled/cache-demo
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 8080;
    server_name localhost;

    # ── Logging khusus agar mudah diamati ─────────────────
    access_log /var/log/nginx/cache_demo_access.log combined;
    error_log  /var/log/nginx/cache_demo_error.log warn;

    # ── ① Endpoint tanpa cache ────────────────────────────
    # Semua request ke /api/nocache diteruskan ke backend
    # dan header MELARANG cache disimpan.
    location /api/nocache {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host $host;

        # Paksa header no-cache meskipun backend tidak mengirimnya
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Tambah header debug — terlihat di curl / DevTools
        add_header X-Cache-Config "no-cache-enforced-by-nginx" always;
    }

    # ── ② Cache-Control max-age ───────────────────────────
    # Browser menyimpan respons selama max-age detik.
    # Setelah expired, browser baru mengirim request baru.
    location /api/cacheable {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host $host;

        # Header berasal dari backend — nginx hanya meneruskan.
        # Komentar baris bawah untuk menggantinya dari sisi nginx:
        # add_header Cache-Control "public, max-age=30" always;

        add_header X-Cache-Config "browser-cache-max-age-30s" always;
    }

    # ── ③ ETag + conditional request ─────────────────────
    location /api/etag {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host $host;
        add_header X-Cache-Config "etag-conditional-request" always;
    }

    # ── ④ Last-Modified + conditional request ────────────
    location /api/lastmod {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host $host;
        add_header X-Cache-Config "last-modified-conditional-request" always;
    }

    # ── ⑤ Endpoint lainnya (counter, reset, slow, static) ─
    location / {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    # ── ⑥ File statis dengan cache jangka panjang ─────────
    # Simulasi aset statis (CSS/JS/gambar) yang aman dicache lama.
    location /static/ {
        proxy_pass http://127.0.0.1:8181;
        proxy_set_header Host $host;

        # Cache 1 jam di browser
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header X-Cache-Config "static-assets-1hour" always;

        # Izinkan nginx menyimpan respons di memori (opsional)
        proxy_cache_valid 200 1h;
    }
}
