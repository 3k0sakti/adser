# ============================================================
# KONFIGURASI 3: Demo Lengkap — Browser Cache vs Proxy Cache
# ============================================================
#
# Arsitektur:
#
#   Browser  ──► Port 8080 (demo server)
#                   │
#                   ├── /no-cache/       → file statis + no-store
#                   ├── /browser-cache/  → file statis + max-age=30
#                   │
#                   └── /proxy-cache/ ──[proxy_cache]──► Port 8888
#                                                            │
#                                                Port 8888 (origin server)
#                                                serve file dari /var/www/html/cache-demo/origin/
#
# ════════════════════════════════════════════════════════════
# Cara mengaktifkan:
#   sudo cp /home/momotaro/cache/nginx/3-demo-full.conf \
#            /etc/nginx/sites-available/cache-demo-full
#   sudo ln -sf /etc/nginx/sites-available/cache-demo-full \
#                /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Bersihkan proxy cache:
#   sudo rm -rf /var/cache/nginx/demo_cache/*
#   sudo nginx -s reload
# ============================================================

# ── Zona proxy cache (WAJIB di luar blok server) ────────────
proxy_cache_path /var/cache/nginx/demo_cache
    levels=1:2
    keys_zone=DEMO_CACHE:5m
    max_size=50m
    inactive=5m
    use_temp_path=off;

# ════════════════════════════════════════════════════════════
# SERVER A: Origin Server (port 8888 — internal only)
# Browser tidak mengakses port ini secara langsung.
# Hanya diakses oleh nginx port 8080 via proxy_pass.
# ════════════════════════════════════════════════════════════
server {
    listen 8889;
    server_name localhost;

    root /var/www/html/cache-demo/origin;

    access_log /var/log/nginx/origin_access.log combined;
    error_log  /var/log/nginx/origin_error.log warn;

    location / {
        # Header debug: tandai bahwa respons ini dari origin
        add_header X-Served-From   "origin-8889"    always;
        add_header X-Origin-Root   "$document_root" always;

        # Sengaja TIDAK memberi izin cache ke nginx proxy
        # (nginx proxy tetap bisa cache via proxy_cache_valid)
        add_header Cache-Control   "no-store"        always;

        try_files $uri $uri/ =404;
    }
}

# ════════════════════════════════════════════════════════════
# SERVER B: Demo Server (port 8080 — diakses mahasiswa)
# ════════════════════════════════════════════════════════════
server {
    listen 8090;
    server_name localhost;

    root /var/www/html/cache-demo;

    access_log /var/log/nginx/cache_demo_access.log combined;
    error_log  /var/log/nginx/cache_demo_error.log warn;

    # ── Halaman utama demo ──────────────────────────────────
    location = / {
        # Sajikan index.html tanpa cache agar perubahan langsung terlihat
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    # ── ① No-Cache: file statis, browser dilarang cache ─────
    #
    # Nginx membaca file dari disk setiap kali request datang.
    # Browser tidak menyimpan respons.
    # Setiap klik → nginx baca file → timestamp di header berubah.
    #
    location /no-cache/ {
        alias /var/www/html/cache-demo/origin/;

        add_header Cache-Control   "no-store, no-cache, must-revalidate" always;
        add_header Pragma          "no-cache"              always;
        add_header X-Cache-Rule    "no-cache-enforced"     always;
        add_header X-Served-From   "nginx-disk-no-cache"   always;
    }

    # ── ② Browser Cache: file statis + max-age ───────────────
    #
    # Browser menyimpan respons selama max-age detik.
    # Setelah cache valid: browser TIDAK mengirim request sama sekali
    # (bahkan tidak ke nginx!) → DevTools menampilkan "(memory cache)"
    # atau "(disk cache)".
    #
    location /browser-cache/ {
        alias /var/www/html/cache-demo/assets/;

        add_header Cache-Control   "public, max-age=30"         always;
        add_header X-Cache-Rule    "browser-cache-max-age-30s"  always;
        add_header X-Served-From   "nginx-disk-browser-cache"   always;

        # Aktifkan ETag + Last-Modified agar browser bisa validasi
        etag         on;
        add_header   Last-Modified $date_gmt always;
    }

    # ── ③ Proxy Cache: nginx menyimpan di server (shared) ────
    #
    # Browser TIDAK menyimpan (no-store dikirim ke browser).
    # Tapi nginx menyimpan salinan respons dari port 8888 di disk.
    #
    # Hasil:
    #   Request 1 → MISS  → nginx proxy ke port 8888 → simpan cache
    #   Request 2 → HIT   → nginx ambil dari disk cache → TIDAK ke port 8888
    #   Setelah 20 detik → EXPIRED → fetch ulang ke port 8888
    #
    location /proxy-cache/ {
        # Proxy ke origin server internal
        proxy_pass  http://127.0.0.1:8889/;

        # Aktifkan zona proxy cache
        proxy_cache             DEMO_CACHE;
        proxy_cache_key         "$scheme$host$request_uri";
        proxy_cache_valid       200 20s;      # cache 20 detik
        proxy_cache_valid       404 30s;
        proxy_cache_use_stale   error timeout updating;
        proxy_cache_lock        on;           # cegah thundering herd

        # KUNCI: abaikan header Cache-Control dari origin
        # Tanpa ini, nginx akan menghormati "no-store" dari origin
        # dan tidak akan menyimpan apapun ke proxy cache
        proxy_ignore_headers    Cache-Control Expires;

        # Header debug: status cache nginx (MISS/HIT/EXPIRED/STALE)
        add_header X-Cache-Status  $upstream_cache_status  always;
        add_header X-Cache-Rule    "nginx-proxy-cache-20s" always;

        # PENTING: kirim no-store ke browser agar browser tidak cache
        # Ini yang membedakan: hanya nginx (server) yang menyimpan cache
        add_header Cache-Control   "no-store"              always;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    # ── ④ Purge: bypass cache dengan request terbaru ─────────
    #
    # Tidak menghapus file cache di disk, tapi memaksa MISS
    # dengan mengirim Cache-Control: no-cache ke nginx proxy.
    #
    location /purge/ {
        proxy_pass  http://127.0.0.1:8889/;

        proxy_cache             DEMO_CACHE;
        proxy_cache_bypass      1;            # paksa BYPASS (tidak pakai cache)
        proxy_no_cache          1;            # jangan simpan ke cache
        proxy_cache_valid       200 20s;

        add_header X-Cache-Status  "BYPASS-MANUAL-PURGE" always;
        add_header Cache-Control   "no-store"             always;
        add_header X-Cache-Rule    "cache-purged"         always;

        proxy_set_header Host $host;
    }

    # ── Fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store" always;
    }
}
